name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify package artifact
        run: |
          PACK_JSON="${RUNNER_TEMP:-$PWD}/pinto-pack.json"
          npm pack --json --ignore-scripts > "$PACK_JSON"
          TARBALL=$(PACK_JSON="$PACK_JSON" node -p "require(process.env.PACK_JSON)[0].filename")
          tar -tf "$TARBALL" | grep -qx "package/dist/index.js"

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
